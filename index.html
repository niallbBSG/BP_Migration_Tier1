<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>BrightPay Migration — Tier 1 Readiness Assessment</title>
<style>
  :root {
    --bright-blue: #1B5FAA;
    --bright-dark: #0D3B6E;
    --bright-light: #E8F0FE;
    --green: #2E7D32;
    --red: #C62828;
    --amber: #F57F17;
    --grey: #6B7280;
    --bg: #F5F7FA;
    --white: #FFFFFF;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--bg);
    color: #1a1a1a;
    line-height: 1.6;
    min-height: 100vh;
  }
  /* PASSWORD GATE */
  .pw-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(135deg, var(--bright-blue), var(--bright-dark));
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
  }
  .pw-box {
    background: white; border-radius: 16px; padding: 48px 44px;
    max-width: 420px; width: 90%; text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .pw-box .logo { font-size: 28px; font-weight: 700; color: var(--bright-blue); margin-bottom: 8px; }
  .pw-box .subtitle { color: var(--grey); font-size: 14px; margin-bottom: 28px; }
  .pw-box input {
    width: 100%; padding: 14px 16px; border: 2px solid #E5E7EB;
    border-radius: 10px; font-size: 16px; font-family: inherit;
    text-align: center; letter-spacing: 2px; transition: border-color 0.2s;
  }
  .pw-box input:focus { outline: none; border-color: var(--bright-blue); }
  .pw-box input.error { border-color: var(--red); animation: shake 0.4s ease; }
  .pw-box .pw-btn {
    display: block; width: 100%; margin-top: 16px; padding: 14px;
    background: var(--bright-blue); color: white; border: none;
    border-radius: 10px; font-size: 16px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: background 0.2s;
  }
  .pw-box .pw-btn:hover { background: var(--bright-dark); }
  .pw-box .pw-error { color: var(--red); font-size: 13px; margin-top: 12px; min-height: 20px; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }
  .pw-hidden { display: none !important; }
  /* MAIN APP */
  .header {
    background: linear-gradient(135deg, var(--bright-blue), var(--bright-dark));
    color: white;
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow);
  }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header .progress-info { font-size: 14px; opacity: 0.9; }
  .progress-bar-container {
    background: rgba(255,255,255,0.2);
    height: 6px;
    border-radius: 3px;
    width: 200px;
    margin-top: 6px;
  }
  .progress-bar {
    background: white;
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .container {
    max-width: 780px;
    margin: 32px auto;
    padding: 0 20px;
  }
  .card {
    background: var(--white);
    border-radius: 12px;
    padding: 36px 40px;
    box-shadow: var(--shadow);
    margin-bottom: 24px;
  }
  .topic-badge {
    display: inline-block;
    background: var(--bright-light);
    color: var(--bright-blue);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .q-number {
    font-size: 13px;
    color: var(--grey);
    margin-bottom: 4px;
  }
  .q-type {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    margin-left: 8px;
    vertical-align: middle;
  }
  .q-type.mc { background: #E3F2FD; color: #1565C0; }
  .q-type.tf { background: #FFF3E0; color: #E65100; }
  .q-type.scenario { background: #F3E5F5; color: #7B1FA2; }
  .q-text {
    font-size: 17px;
    font-weight: 500;
    margin-bottom: 8px;
    line-height: 1.5;
  }
  .q-scenario {
    background: #F8F9FA;
    border-left: 4px solid var(--bright-blue);
    padding: 14px 18px;
    margin: 12px 0 20px 0;
    border-radius: 0 8px 8px 0;
    font-style: italic;
    color: #374151;
    font-size: 15px;
  }
  .options { margin-top: 16px; }
  .option-btn {
    display: block;
    width: 100%;
    text-align: left;
    padding: 14px 18px;
    margin-bottom: 10px;
    border: 2px solid #E5E7EB;
    border-radius: 10px;
    background: white;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    line-height: 1.4;
  }
  .option-btn:hover { border-color: var(--bright-blue); background: var(--bright-light); }
  .option-btn.selected { border-color: var(--bright-blue); background: var(--bright-light); font-weight: 500; }
  .tf-group { display: flex; gap: 12px; margin-top: 16px; }
  .tf-btn {
    flex: 1;
    padding: 14px;
    border: 2px solid #E5E7EB;
    border-radius: 10px;
    background: white;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    text-align: center;
  }
  .tf-btn:hover { border-color: var(--bright-blue); }
  .tf-btn.selected { border-color: var(--bright-blue); background: var(--bright-light); }
  .text-answer {
    width: 100%;
    min-height: 140px;
    padding: 14px 16px;
    border: 2px solid #E5E7EB;
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    line-height: 1.5;
    resize: vertical;
    margin-top: 16px;
    transition: border-color 0.2s;
  }
  .text-answer:focus { outline: none; border-color: var(--bright-blue); }
  .text-answer::placeholder { color: #9CA3AF; }
  .hint {
    font-size: 13px;
    color: var(--grey);
    margin-top: 8px;
    font-style: italic;
  }
  .btn-next {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--bright-blue);
    color: white;
    border: none;
    padding: 12px 28px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 20px;
    transition: background 0.2s;
    font-family: inherit;
  }
  .btn-next:hover { background: var(--bright-dark); }
  .btn-next:disabled { background: #9CA3AF; cursor: not-allowed; }
  .btn-next .arrow { font-size: 18px; }
  .welcome-card h2 {
    color: var(--bright-blue);
    font-size: 26px;
    margin-bottom: 16px;
  }
  .welcome-card p { margin-bottom: 14px; font-size: 15px; }
  .welcome-card .stat-row {
    display: flex;
    gap: 16px;
    margin: 20px 0;
    flex-wrap: wrap;
  }
  .stat-box {
    flex: 1;
    min-width: 140px;
    background: var(--bright-light);
    padding: 16px;
    border-radius: 10px;
    text-align: center;
  }
  .stat-box .num { font-size: 28px; font-weight: 700; color: var(--bright-blue); }
  .stat-box .label { font-size: 12px; color: var(--grey); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
  .name-input {
    width: 100%;
    max-width: 380px;
    padding: 12px 16px;
    border: 2px solid #E5E7EB;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    margin-top: 8px;
    transition: border-color 0.2s;
  }
  .name-input:focus { outline: none; border-color: var(--bright-blue); }
  /* Results */
  .results-card h2 { color: var(--bright-blue); font-size: 24px; margin-bottom: 20px; }
  .verdict-box {
    text-align: center;
    padding: 28px;
    border-radius: 12px;
    margin: 20px 0;
  }
  .verdict-box.pass { background: #E8F5E9; border: 2px solid var(--green); }
  .verdict-box.fail { background: #FFEBEE; border: 2px solid var(--red); }
  .verdict-box .verdict-label { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
  .verdict-box.pass .verdict-label { color: var(--green); }
  .verdict-box.fail .verdict-label { color: var(--red); }
  .verdict-box .verdict-score { font-size: 48px; font-weight: 700; margin: 8px 0; }
  .verdict-box.pass .verdict-score { color: var(--green); }
  .verdict-box.fail .verdict-score { color: var(--red); }
  .verdict-box .verdict-text { font-size: 16px; font-weight: 500; }
  .breakdown-table {
    width: 100%;
    border-collapse: collapse;
    margin: 20px 0;
    font-size: 14px;
  }
  .breakdown-table th {
    background: var(--bright-blue);
    color: white;
    padding: 10px 14px;
    text-align: left;
    font-weight: 600;
  }
  .breakdown-table td {
    padding: 10px 14px;
    border-bottom: 1px solid #E5E7EB;
  }
  .breakdown-table tr:nth-child(even) { background: #F9FAFB; }
  .score-bar-bg {
    background: #E5E7EB;
    height: 8px;
    border-radius: 4px;
    overflow: hidden;
    min-width: 100px;
  }
  .score-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s ease;
  }
  .gap-section { margin-top: 24px; }
  .gap-section h3 { font-size: 16px; color: var(--red); margin-bottom: 10px; }
  .gap-item {
    background: #FFF8E1;
    border-left: 4px solid var(--amber);
    padding: 12px 16px;
    margin-bottom: 10px;
    border-radius: 0 8px 8px 0;
    font-size: 14px;
  }
  .gap-item strong { color: #333; }
  .review-section { margin-top: 24px; }
  .review-section h3 { font-size: 16px; color: var(--bright-blue); margin-bottom: 12px; }
  .review-item {
    background: #F8F9FA;
    padding: 16px;
    border-radius: 10px;
    margin-bottom: 12px;
    font-size: 14px;
  }
  .review-item .rq { font-weight: 600; margin-bottom: 6px; }
  .review-item .ryour { color: var(--red); margin-bottom: 4px; }
  .review-item .rcorrect { color: var(--green); }
  .review-item .rmark { float: right; font-weight: 700; font-size: 15px; }
  .hidden { display: none; }
  .timer { font-size: 13px; color: rgba(255,255,255,0.8); margin-top: 4px; }
  @media (max-width: 600px) {
    .card { padding: 24px 20px; }
    .header { flex-direction: column; gap: 8px; }
    .stat-row { flex-direction: column; }
    .pw-box { padding: 32px 24px; }
  }
  .action-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
  .action-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 11px 22px; border-radius: 8px; font-size: 14px;
    font-weight: 600; cursor: pointer; font-family: inherit;
    border: 2px solid transparent; transition: all 0.2s;
  }
  .action-btn.primary { background: var(--bright-blue); color: white; border-color: var(--bright-blue); }
  .action-btn.primary:hover { background: var(--bright-dark); }
  .action-btn.secondary { background: white; color: var(--bright-blue); border-color: var(--bright-blue); }
  .action-btn.secondary:hover { background: var(--bright-light); }
  .action-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .log-status {
    margin-top: 12px; padding: 10px 14px; border-radius: 8px;
    font-size: 13px; display: none;
  }
  .log-status.success { display: block; background: #E8F5E9; color: var(--green); }
  .log-status.error { display: block; background: #FFEBEE; color: var(--red); }
  .log-status.pending { display: block; background: #FFF8E1; color: var(--amber); }
  @media print {
    .header { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
    .action-buttons, .log-status { display: none !important; }
  }
</style>
</head>
<body>

<!-- PASSWORD GATE -->
<div class="pw-overlay" id="pwOverlay">
  <div class="pw-box">
    <div class="logo">BrightPay</div>
    <div class="subtitle">Tier 1 Readiness Assessment</div>
    <p style="font-size:14px;color:#374151;margin-bottom:20px;">Enter the access code provided by your team lead to begin.</p>
    <input type="password" id="pwInput" placeholder="Access code" autofocus>
    <button class="pw-btn" id="pwBtn" onclick="checkPassword()">Continue</button>
    <div class="pw-error" id="pwError"></div>
  </div>
</div>

<!-- MAIN APP (hidden until password entered) -->
<div id="mainApp" class="pw-hidden">
  <div class="header">
    <div>
      <h1>BrightPay Migration — Tier 1 Readiness Assessment</h1>
      <div class="progress-info" id="progressInfo">Welcome</div>
      <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
      <div class="timer" id="timerDisplay"></div>
    </div>
  </div>
  <div class="container" id="content"></div>
</div>

};

// Email recipients

function checkPassword() {
  const input = document.getElementById('pwInput').value.trim();
  if (input === ACCESS_CODE) {
    document.getElementById('pwOverlay').classList.add('pw-hidden');
    document.getElementById('mainApp').classList.remove('pw-hidden');
    showWelcome();
  } else {
    document.getElementById('pwInput').classList.add('error');
    document.getElementById('pwError').textContent = 'Incorrect access code. Please try again.';
    setTimeout(() => document.getElementById('pwInput').classList.remove('error'), 400);
  }
}
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('pwInput').addEventListener('keypress', e => { if (e.key === 'Enter') checkPassword(); });
});

const QUESTIONS = [

const TOTAL_QUESTIONS = QUESTIONS.length;
const TOTAL_POINTS = QUESTIONS.reduce((s, q) => s + q.points, 0);

let currentQ = -1;
let answers = {};
let startTime = null;
let timerInterval = null;
let agentName = "";

function $(id) { return document.getElementById(id); }

function startTimer() {
  startTime = Date.now();
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const m = Math.floor(elapsed / 60);
    const s = elapsed % 60;
    $('timerDisplay').textContent = 'Time: ' + m + ':' + s.toString().padStart(2, '0');
  }, 1000);
}

function updateProgress() {
  const pct = ((currentQ + 1) / TOTAL_QUESTIONS) * 100;
  $('progressBar').style.width = pct + '%';
  $('progressInfo').textContent = 'Question ' + (currentQ + 1) + ' of ' + TOTAL_QUESTIONS;
}

// --- GITHUB RESULTS LOGGING ---
function logToGitHub(resultData) {
  var statusEl = document.getElementById('logStatus');
  if (GITHUB_CONFIG.token === 'YOUR_TOKEN_HERE') {
    if (statusEl) { statusEl.className = 'log-status error'; statusEl.textContent = 'Results logging not configured — GitHub token not set.'; }
    return;
  }
  if (statusEl) { statusEl.className = 'log-status pending'; statusEl.textContent = 'Saving results...'; }

  var now = new Date();
  var timestamp = now.toISOString().replace(/[:.]/g, '-').substring(0, 19);
  var safeName = resultData.agentName.replace(/[^a-zA-Z0-9]/g, '_');
  var filePath = 'results/' + safeName + '_' + timestamp + '.json';

  var fileContent = JSON.stringify(resultData, null, 2);
  var base64Content = btoa(unescape(encodeURIComponent(fileContent)));

  fetch('https://api.github.com/repos/' + GITHUB_CONFIG.owner + '/' + GITHUB_CONFIG.repo + '/contents/' + filePath, {
    method: 'PUT',
    headers: {
      'Authorization': 'Bearer ' + GITHUB_CONFIG.token,
      'Content-Type': 'application/json',
      'Accept': 'application/vnd.github.v3+json'
    },
    body: JSON.stringify({
      message: 'Assessment result: ' + resultData.agentName + ' — ' + resultData.percentage + '% (' + resultData.verdict + ')',
      content: base64Content,
      branch: GITHUB_CONFIG.branch
    })
  })
  .then(function(response) {
    if (response.ok) {
      if (statusEl) { statusEl.className = 'log-status success'; statusEl.textContent = 'Results saved successfully.'; }
    } else {
      response.text().then(function(t) {
        if (statusEl) { statusEl.className = 'log-status error'; statusEl.textContent = 'Could not save results. Please use the email or PDF option.'; }
      });
    }
  })
  .catch(function(err) {
    if (statusEl) { statusEl.className = 'log-status error'; statusEl.textContent = 'Could not save results. Please use the email or PDF option.'; }
  });
}

  nextQuestion();
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= TOTAL_QUESTIONS) { showResults(); return; }
  updateProgress();
  renderQuestion(QUESTIONS[currentQ]);
}

function renderQuestion(q) {
  var html = '<div class="card">';
  html += '<span class="topic-badge">' + q.topic + '</span>';
  html += '<div class="q-number">Question ' + q.id + ' of ' + TOTAL_QUESTIONS;
  if (q.type === 'mc') html += '<span class="q-type mc">Multiple Choice</span>';
  else if (q.type === 'tf') html += '<span class="q-type tf">True / False</span>';
  else html += '<span class="q-type scenario">Scenario — Written Response</span>';
  html += ' <span style="float:right;font-size:12px;color:#9CA3AF;">' + q.points + ' point' + (q.points > 1 ? 's' : '') + '</span></div>';
  html += '<div class="q-text">' + q.text + '</div>';

  if (q.scenario) html += '<div class="q-scenario">' + q.scenario + '</div>';
  if (q.prompt) html += '<div class="q-text" style="font-size:15px;margin-top:8px;">' + q.prompt + '</div>';

  if (q.type === 'mc') {
    html += '<div class="options">';
    q.options.forEach(function(opt, i) {
      html += '<button class="option-btn" data-idx="' + i + '" onclick="selectOption(this, ' + i + ')">' + String.fromCharCode(65 + i) + ') ' + opt + '</button>';
    });
    html += '</div>';
  } else if (q.type === 'tf') {
    html += '<div class="tf-group">' +
      '<button class="tf-btn" onclick="selectTF(this, true)">True</button>' +
      '<button class="tf-btn" onclick="selectTF(this, false)">False</button>' +
    '</div>';
  } else {
    html += '<textarea class="text-answer" id="textAnswer" placeholder="Type your answer here..."></textarea>';
    html += '<p class="hint">Be specific — reference the actual processes, tools, macros, or contacts from your training.</p>';
  }

  html += '<button class="btn-next" id="nextBtn" onclick="submitAnswer()" disabled>' +
    (currentQ < TOTAL_QUESTIONS - 1 ? 'Next Question' : 'Finish Assessment') + ' <span class="arrow">&rarr;</span>' +
  '</button>';
  html += '</div>';
  $('content').innerHTML = html;

  if (q.type === 'scenario') {
    var ta = $('textAnswer');
    ta.addEventListener('input', function() {
      $('nextBtn').disabled = ta.value.trim().length < 10;
    });
    setTimeout(function() { ta.focus(); }, 100);
  }
}

var selectedMC = null;
var selectedTF = null;

function selectOption(btn, idx) {
  document.querySelectorAll('.option-btn').forEach(function(b) { b.classList.remove('selected'); });
  btn.classList.add('selected');
  selectedMC = idx;
  $('nextBtn').disabled = false;
}

function selectTF(btn, val) {
  document.querySelectorAll('.tf-btn').forEach(function(b) { b.classList.remove('selected'); });
  btn.classList.add('selected');
  selectedTF = val;
  $('nextBtn').disabled = false;
}

function submitAnswer() {
  var q = QUESTIONS[currentQ];
  if (q.type === 'mc') {
    answers[q.id] = { type: 'mc', selected: selectedMC, correct: q.correct, isCorrect: selectedMC === q.correct, points: q.points, topic: q.topic, text: q.text, userAnswer: q.options[selectedMC], correctAnswer: q.options[q.correct] };
    selectedMC = null;
  } else if (q.type === 'tf') {
    answers[q.id] = { type: 'tf', selected: selectedTF, correct: q.correct, isCorrect: selectedTF === q.correct, points: q.points, topic: q.topic, text: q.text, userAnswer: selectedTF ? 'True' : 'False', correctAnswer: q.correct ? 'True' : 'False', explanation: q.explanation };
    selectedTF = null;
  } else {
    var text = $('textAnswer').value.trim();
    var score = scoreScenario(text, q);
    answers[q.id] = { type: 'scenario', text: text, score: score, maxPoints: q.points, topic: q.topic, qtext: q.text + (q.scenario ? ' ' + q.scenario : '') + (q.prompt ? ' ' + q.prompt : ''), idealAnswer: q.idealAnswer };
  }
  nextQuestion();
}

function scoreScenario(text, q) {
  var lower = text.toLowerCase();
  if (!q.keyPhraseSets || q.keyPhraseSets.length === 0) return 0;
  var hits = 0;
  q.keyPhraseSets.forEach(function(set) {
    var matched = set.some(function(kw) { return lower.indexOf(kw.toLowerCase()) !== -1; });
    if (matched) hits++;
  });
  var ratio = hits / q.keyPhraseSets.length;
  if (ratio >= 0.85) return q.points;
  if (ratio >= 0.6) return Math.ceil(q.points * 0.66);
  if (ratio >= 0.35) return Math.ceil(q.points * 0.33);
  return 0;
}

function showResults() {
  clearInterval(timerInterval);
  var elapsed = Math.floor((Date.now() - startTime) / 1000);
  var minutes = Math.floor(elapsed / 60);
  var seconds = elapsed % 60;

  var totalEarned = 0;
  var topicScores = {};
  var topicMax = {};
  var incorrect = [];

  Object.values(answers).forEach(function(a) {
    if (!topicScores[a.topic]) { topicScores[a.topic] = 0; topicMax[a.topic] = 0; }
    if (a.type === 'scenario') {
      topicScores[a.topic] += a.score;
      topicMax[a.topic] += a.maxPoints;
      totalEarned += a.score;
      if (a.score < a.maxPoints) {
        incorrect.push({ topic: a.topic, question: a.qtext, yourAnswer: a.text, correctAnswer: a.idealAnswer, earned: a.score, max: a.maxPoints, type: 'scenario' });
      }
    } else {
      topicMax[a.topic] += a.points;
      if (a.isCorrect) {
        topicScores[a.topic] += a.points;
        totalEarned += a.points;
      } else {
        incorrect.push({ topic: a.topic, question: a.text, yourAnswer: a.userAnswer, correctAnswer: a.correctAnswer + (a.explanation ? ' — ' + a.explanation : ''), earned: 0, max: a.points, type: a.type });
      }
    }
  });

  var pct = Math.round((totalEarned / TOTAL_POINTS) * 100);
  var passed = pct >= 80;

  $('progressInfo').textContent = 'Assessment Complete';
  $('progressBar').style.width = '100%';
  $('timerDisplay').textContent = 'Completed in ' + minutes + 'm ' + seconds + 's';

  var html = '<div class="card results-card">' +
    '<h2>Assessment Results — ' + agentName + '</h2>' +
    '<div class="verdict-box ' + (passed ? 'pass' : 'fail') + '">' +
      '<div class="verdict-label">' + (passed ? '\u2713 Go Live Ready' : '\u2717 Not Yet Ready') + '</div>' +
      '<div class="verdict-score">' + pct + '%</div>' +
      '<div class="verdict-text">' + totalEarned + ' / ' + TOTAL_POINTS + ' points</div>' +
    '</div>' +
    '<p style="text-align:center;color:var(--grey);font-size:14px;">Completed in ' + minutes + ' minutes ' + seconds + ' seconds</p>';

  // Breakdown table
  html += '<h3 style="margin-top:28px;font-size:16px;color:var(--bright-blue);">Score Breakdown by Topic</h3>' +
    '<table class="breakdown-table">' +
      '<tr><th>Topic Area</th><th>Score</th><th>Percentage</th><th style="min-width:120px;"></th></tr>';
  Object.keys(topicMax).forEach(function(topic) {
    var s = topicScores[topic] || 0;
    var m = topicMax[topic];
    var p = Math.round((s / m) * 100);
    var color = p >= 80 ? 'var(--green)' : p >= 60 ? 'var(--amber)' : 'var(--red)';
    html += '<tr>' +
      '<td>' + topic + '</td>' +
      '<td>' + s + ' / ' + m + '</td>' +
      '<td style="font-weight:600;color:' + color + '">' + p + '%</td>' +
      '<td><div class="score-bar-bg"><div class="score-bar-fill" style="width:' + p + '%;background:' + color + ';"></div></div></td>' +
    '</tr>';
  });
  html += '</table>';

  // Knowledge gaps
  if (incorrect.length > 0) {
    html += '<div class="gap-section">' +
      '<h3>\u26A0 Knowledge Gaps Identified (' + incorrect.length + ' question' + (incorrect.length > 1 ? 's' : '') + ')</h3>';
    var gapTopics = {};
    incorrect.forEach(function(item) {
      if (!gapTopics[item.topic]) gapTopics[item.topic] = [];
      gapTopics[item.topic].push(item);
    });
    Object.keys(gapTopics).forEach(function(topic) {
      html += '<div class="gap-item"><strong>' + topic + '</strong> — ' + gapTopics[topic].length + ' question' + (gapTopics[topic].length > 1 ? 's' : '') + ' to review</div>';
    });
    html += '</div>';
  }

  // Full review
  html += '<div class="review-section"><h3>Full Question Review</h3>';
  Object.keys(answers).forEach(function(id) {
    var a = answers[id];
    var q = QUESTIONS.find(function(qq) { return qq.id == id; });
    var earned, max, isRight;
    if (a.type === 'scenario') {
      earned = a.score; max = a.maxPoints; isRight = earned === max;
    } else {
      earned = a.isCorrect ? a.points : 0; max = a.points; isRight = a.isCorrect;
    }
    var mark = isRight ? '<span class="rmark" style="color:var(--green);">\u2713 ' + earned + '/' + max + '</span>' : '<span class="rmark" style="color:var(--red);">' + earned + '/' + max + '</span>';
    html += '<div class="review-item">' + mark + '<div class="rq">Q' + id + ': ' + (a.type === 'scenario' ? (a.qtext || q.text) : a.text) + '</div>';
    if (a.type === 'scenario') {
      html += '<div class="ryour"><strong>Your answer:</strong> ' + a.text.substring(0, 300) + (a.text.length > 300 ? '...' : '') + '</div>';
      html += '<div class="rcorrect"><strong>Model answer:</strong> ' + a.idealAnswer + '</div>';
    } else {
      html += '<div class="ryour"><strong>Your answer:</strong> ' + a.userAnswer + '</div>';
      if (!isRight) html += '<div class="rcorrect"><strong>Correct answer:</strong> ' + a.correctAnswer + (a.explanation ? ' — ' + a.explanation : '') + '</div>';
    }
    html += '</div>';
  });
  html += '</div>';

  if (!passed) {
    html += '<div style="background:#FFF3E0;border:2px solid var(--amber);border-radius:10px;padding:20px;margin-top:24px;">' +
      '<strong style="color:var(--amber);">Recommended Next Steps</strong>' +
      '<p style="margin-top:8px;font-size:14px;">Review the training materials for the topic areas flagged above, then retake this assessment. Focus particularly on the scenario-based questions — these test whether you can apply your knowledge on a real call.</p>' +
    '</div>';
  } else {
    html += '<div style="background:#E8F5E9;border:2px solid var(--green);border-radius:10px;padding:20px;margin-top:24px;">' +
      '<strong style="color:var(--green);">Congratulations!</strong>' +
      '<p style="margin-top:8px;font-size:14px;">You\'ve demonstrated the knowledge needed to handle live migration calls. Review any flagged areas above to sharpen up, and you\'re good to go.</p>' +
    '</div>';
  }

  // Build result data object for logging and email
  var topicBreakdown = {};
  Object.keys(topicMax).forEach(function(topic) {
    var s = topicScores[topic] || 0;
    var m = topicMax[topic];
    topicBreakdown[topic] = s + '/' + m + ' (' + Math.round((s/m)*100) + '%)';
  });
  var gapList = [];
  if (incorrect.length > 0) {
    var gapTopicsSummary = {};
    incorrect.forEach(function(item) {
      if (!gapTopicsSummary[item.topic]) gapTopicsSummary[item.topic] = 0;
      gapTopicsSummary[item.topic]++;
    });
    Object.keys(gapTopicsSummary).forEach(function(t) {
      gapList.push(t + ': ' + gapTopicsSummary[t] + ' question(s) to review');
    });
  }
  var attemptKey = 'bp_assessment_' + agentName.toLowerCase().replace(/[^a-z0-9]/g, '_');
  var prevAttempts = 0;
  try { prevAttempts = parseInt(sessionStorage.getItem(attemptKey) || '0', 10); } catch(e) {}
  prevAttempts++;
  try { sessionStorage.setItem(attemptKey, prevAttempts.toString()); } catch(e) {}

  var resultData = {
    agentName: agentName,
    completedAt: new Date().toISOString(),
    timeTaken: minutes + 'm ' + seconds + 's',
    score: totalEarned,
    totalPoints: TOTAL_POINTS,
    percentage: pct,
    verdict: passed ? 'GO LIVE READY' : 'NOT YET READY',
    attemptNumber: prevAttempts,
    topicBreakdown: topicBreakdown,
    gaps: gapList,
    answers: answers
  };

  // Action buttons
  html += '<div class="action-buttons">' +
    '<button class="action-btn primary" onclick="sendResultsEmail(window._resultData)">Email Results</button>' +
    '<button class="action-btn secondary" onclick="window.print()">Save as PDF</button>' +
  '</div>' +
  '<div class="log-status" id="logStatus"></div>';

  html += '</div>';
  $('content').innerHTML = html;
  window.scrollTo(0, 0);

  // Store for button callbacks and auto-log to GitHub
  window._resultData = resultData;
  logToGitHub(resultData);
}
</script>
</body>
</html>
